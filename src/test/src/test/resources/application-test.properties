# Spring app name can remain the same
spring.application.name=User_Engagement_Platform

# H2 in-memory DB for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate auto-create tables in H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cache can remain Redis if you want to test caching, or use simple cache for test
spring.cache.type=simple

# Flyway migration disabled for H2 tests
spring.flyway.enabled=false